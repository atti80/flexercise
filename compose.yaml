name: mes-dev-environment

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    env_file:
      - .env.development.local
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "P@ssw0rd!" -C -Q "SELECT 1" >/dev/null 2>&1',
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.development.local
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Waiting for SQL Server to accept connections...';
      until /opt/mssql-tools18/bin/sqlcmd -S db,1433 -U sa -P \"P@ssw0rd!\" -C -Q \"SELECT 1\" >/dev/null 2>&1; do sleep 2; done;
      echo 'Creating database if missing...';
      /opt/mssql-tools18/bin/sqlcmd -S db,1433 -U sa -P \"P@ssw0rd!\" -d master -C -Q \"IF DB_ID(N'MESDb') IS NULL CREATE DATABASE [MESDb];\";
      echo 'Init complete.';
      "
    restart: "no"

  app:
    build:
      context: ./
      dockerfile: ./Dockerfile
    command: "sleep infinity"
    env_file:
      - .env.development.local
    ports:
      - "5000:5000"
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - .:/workspace
